<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>


</head>
<body>
	<script>
		function setup(){
			createCanvas(800,800)
		}

//to apply transofmrations to certain shapes --> put shape in between push and pop 
//only using rotate function --> whole canvas rotates = top left corner = 0,0
//"Translate" changes the original point = becomes new 0,0
		function draw(){
			background(200)

			push()
			translate(300,300)
			rectMode(CENTER)
			rotate(frameCount *0.05)
			rect(0,0,100,50)
			pop()

			push()
			rectMode(CENTER)
			translate(width/2,height/2)
			rotate(frameCount*0.01)
			rect(0, 0, 200, 50)
			pop()

			circle(100-50,100-50,50)
			circle(0+50,0-50,50)
		}
	</script>
</body>
</html>
