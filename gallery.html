<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<style>
		.container {
			display:grid;
			grid-template-columns:repeat(5,1fr);
			gap: 20px;
		}

		.item{
			border:1.5px solid black;
		}
		.item img{
			width:100%;
			height:100%;
			object-fit:cover;
		}
		#item1{
			grid-column: 1 / 3;
			grid-row: 1 / 3;
		}
		#item2{
			grid-column: 1 / 3;
			grid-row: 3 / 3;
		}

		@media (max-width:800px){
			.container{
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<div class = "container">
		<div class="item" id="item1">
			<img src="chipotle.png" alt="chipotle">
		</div>
		<div class="item" id="item2">
			<img src="mc.png" alt="mc">
		</div>
		<div class="item">
			<img src="shack.png" alt="shack">
		</div>
		<div class="item">
			<img src="chickfila.png" alt="chick">
		</div>
		<div class="item">
			<img src="playa.png" alt="playa">
		</div>
		<div class="item">
			<img src="canes.png" alt="canes">
		</div>
		<div class="item">
			<img src="wingstop.png" alt="wingstop">
		</div>
		
	</div>
</body>
</html>
