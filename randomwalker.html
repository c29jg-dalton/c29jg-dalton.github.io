<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>

</head>
<body>
<!-- //everytying in draw functoin will happen ever frame, things in setup function only run once -->
	<script>
		let xpos
		let ypos

		function setup() {
			createCanvas (800,800)
			background("#69585F")
			xpos = width/2
			ypos = height/2
			noStroke()
			let randomNumber=random([100])
			console.log(randomNumber)
			
		}

		function draw(){
			let randomNumber=floor(random(4))
			let randomColor = random(["#D9DBBC","#FCDDBC","#EF959D"])
			
			if (randomNumber==0){
				xpos=xpos+10
			}else if(randomNumber==1){
				xpos=xpos-10
			}else if(randomNumber==2){
				ypos=ypos+10
			}else if(randomNumber==3){
				ypos=ypos-10
			}
			fill(randomColor)
			circle(xpos, ypos, 10)
		}

	</script>

</body>
</html>
