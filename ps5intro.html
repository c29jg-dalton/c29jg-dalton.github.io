<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Document</title>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>

</head>
<body>
	<script> 
function setup() {
  createCanvas(400, 400);
  noStroke()
}

function draw() {
  background("#E0A800");
  fill("#E3940E")
  ellipse(50, 100, 80, 80);
  fill("#9A0DDE")
  stroke("#E0BB4B")
  strokeWeight(3)
  fill("#E3790E")
  circle(200,200,50)
  fill("#E0AD00")
  rect(250,250,100,50)
  fill("#E3940E")
  ellipse(100,10, 30, 40);
  fill("#9A0DDE")
  stroke("#E0BB4B")
  strokeWeight(3)

  push()
  rectMode(CENTER) 
  rotate(frameCount*0.01)
  fill("#E3790E")
  circle(200,200,40)
  pop()

  fill("#E0AD00")
  rect(100,50,100,10)
  fill("#E3790E")
  rect(50,200,50,100)
  fill("#E3940E")
  ellipse(400, 200, 50, 80);

}
	</script>
</body>
</html>
